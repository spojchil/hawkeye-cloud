name: CI/CD

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - '**/src/**'
      - '**/pom.xml'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/src/**'
      - '**/pom.xml'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'docker-compose.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ==================== CI ====================
      - name: 编译
        run: mvn clean compile

      - name: 单元测试
        run: mvn test

      # ==================== CD（仅 main 分支）====================
      - name: 打包 jar
        if: github.ref_name == 'main'
        run: mvn package -DskipTests

      - name: 登录 GitHub Container Registry
        if: github.ref_name == 'main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        if: github.ref_name == 'main'
        run: |
          docker compose build
          docker compose push
