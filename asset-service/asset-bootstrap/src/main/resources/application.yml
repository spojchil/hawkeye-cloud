spring:
  application:
    name: asset-service

#  threads.virtual.enabled: true 整个框架没跟随，聊胜于无，仍然需要自己实现虚拟线程相关


  profiles:
    active: dev

  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:common-${spring.profiles.active}.yaml

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
#        namespace: ${NACOS_NAMESPACE:dev}
        group: DEFAULT_GROUP

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hawkeye}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000



logging:
  level:
    com.hawkeye.auth.business.mapper: debug
    com.hawkeye.auth.business.service: info
    com.hawkeye.auth.api.controller: info

# ★ MyBatis → MyBatis-Plus 迁移要点：
#   - 二级配置名从 mybatis: 变为 mybatis-plus:
#   - 枚举处理器从自定义 CodeEnumTypeHandler 改为 MybatisEnumTypeHandler（自动处理 IEnum）
#   - 逻辑删除由 @TableLogic 注解 + 全局配置共同控制，二者等效
#   - PageHelper 已移除，分页由 PaginationInnerInterceptor + Page<T> 对象实现
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.hawkeye.asset.common.pojo.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: ${SERVER_PORT:8003}