spring:
  application:
    name: vul-service

  profiles:
    active: dev

  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:common-${spring.profiles.active}.yaml

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        group: DEFAULT_GROUP

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hawkeye}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    com.hawkeye.vul.business.mapper: debug
    com.hawkeye.vul.business.service: info
    com.hawkeye.vul.api.controller: debug

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.hawkeye.vul.common.pojo.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: ${SERVER_PORT:8004}
