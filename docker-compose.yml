services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0
    container_name: hawkeye-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hawkeye
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/sql/认证服务.sql:/docker-entrypoint-initdb.d/01-auth.sql
      - ./docs/sql/资产服务.sql:/docker-entrypoint-initdb.d/02-asset.sql
      - ./docs/sql/漏洞管理服务.sql:/docker-entrypoint-initdb.d/03-vul.sql
      - ./docs/sql/任务调度服务.sql:/docker-entrypoint-initdb.d/04-task.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hawkeye-net

  redis:
    image: redis:7-alpine
    container_name: hawkeye-redis
    command: redis-server --requirepass 123456
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hawkeye-net

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: hawkeye-nacos
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - hawkeye-net

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.3
    container_name: hawkeye-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    networks:
      - hawkeye-net

  rocketmq-broker:
    image: apache/rocketmq:5.3.3
    container_name: hawkeye-rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10911:10911"
      - "10909:10909"
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    networks:
      - hawkeye-net

  # ==================== 微服务 ====================
  gateway:
    build: ./gateway-service/gateway-bootstrap
    image: ghcr.io/spojchil/hawkeye-gateway:latest
    container_name: hawkeye-gateway
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 123456
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      SERVER_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: on-failure
    networks:
      - hawkeye-net

  auth-service:
    build: ./auth-service/auth-bootstrap
    image: ghcr.io/spojchil/hawkeye-auth:latest
    container_name: hawkeye-auth
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hawkeye
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 123456
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      SERVER_PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: on-failure
    networks:
      - hawkeye-net

  asset-service:
    build: ./asset-service/asset-bootstrap
    image: ghcr.io/spojchil/hawkeye-asset:latest
    container_name: hawkeye-asset
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hawkeye
      DB_USERNAME: root
      DB_PASSWORD: root
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      SERVER_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: on-failure
    networks:
      - hawkeye-net

  vul-service:
    build: ./vul-service/vul-bootstrap
    image: ghcr.io/spojchil/hawkeye-vul:latest
    container_name: hawkeye-vul
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hawkeye
      DB_USERNAME: root
      DB_PASSWORD: root
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      SERVER_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: on-failure
    networks:
      - hawkeye-net

  task-service:
    build: ./task-service/task-bootstrap
    image: ghcr.io/spojchil/hawkeye-task:latest
    container_name: hawkeye-task
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hawkeye
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 123456
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      ROCKETMQ_HOST: rocketmq-namesrv
      ROCKETMQ_PORT: 9876
      SERVER_PORT: 8005
    ports:
      - "8005:8005"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: on-failure
    networks:
      - hawkeye-net

  detection-service:
    build: ./detection-service/detection-bootstrap
    image: ghcr.io/spojchil/hawkeye-detection:latest
    container_name: hawkeye-detection
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hawkeye
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 123456
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      ROCKETMQ_HOST: rocketmq-namesrv
      ROCKETMQ_PORT: 9876
      SERVER_PORT: 8006
    ports:
      - "8006:8006"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    restart: on-failure
    networks:
      - hawkeye-net

  web-admin:
    build: ./web-admin
    container_name: hawkeye-web-admin
    ports:
      - "3000:3000"
    networks:
      - hawkeye-net

networks:
  hawkeye-net:
    driver: bridge

volumes:
  mysql-data:
