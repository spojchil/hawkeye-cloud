spring:
  application:
    name: vul-service

  profiles:
    active: dev

  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:common-${spring.profiles.active}.yaml

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        group: DEFAULT_GROUP

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hawkeye}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    com.hawkeye.vul.business.mapper: warn
    com.hawkeye.vul.business.service: warn
    com.hawkeye.vul.api.controller: warn

# ★ MyBatis-Plus 配置要点：
#   - 枚举处理器 MybatisEnumTypeHandler 自动处理 IEnum 实现类
#   - 逻辑删除由 @TableLogic 注解 + 全局配置共同控制
#   - 分页由 PaginationInnerInterceptor + Page<T> 对象实现
#   - 多租户由 TenantLineInnerInterceptor + TenantLineHandler 自动注入
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.hawkeye.vul.common.pojo.entity

knife4j:
  enable: true

server:
  port: ${SERVER_PORT:8004}
